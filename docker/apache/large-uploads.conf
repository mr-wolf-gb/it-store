# Apache configuration for large file uploads
# Allow unlimited request body size (0 = unlimited)
LimitRequestBody 0

# Increase timeout for large file transfers (seconds)
Timeout 600

# Keep connections alive for large transfers
KeepAliveTimeout 5
MaxKeepAliveRequests 100

# Increase max request line length if needed
LimitRequestLine 8190
LimitRequestFieldSize 8190
