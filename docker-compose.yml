services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: it-store:latest
    container_name: it-store-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "false"
    ports:
      - "8080:80"
    volumes:
      - ./.env:/var/www/html/.env
      - it_store_storage:/var/www/html/storage
      - it_store_database:/var/www/html/database
      - it_store_bootstrap_cache:/var/www/html/bootstrap/cache

volumes:
  it_store_storage:
  it_store_database:
  it_store_bootstrap_cache:
